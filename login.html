<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - EduLink</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>EduLink</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="about.html"><i class="fas fa-info-circle"></i> Acerca de</a>
        </div>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <h2 id="formTitle"><i class="fas fa-user-graduate"></i> Iniciar Sesión</h2>
            <form id="loginForm">
                <!-- Campo NOMBRE COMPLETO (solo visible en modo registro) -->
                <div id="nombreField" style="display: none;">
                    <input type="text" id="nombreInput" placeholder="Nombre completo" autocomplete="name">
                </div>
                <div>
                    <input type="email" id="emailInput" placeholder="Correo electrónico" required>
                </div>
                <div>
                    <input type="password" id="passwordInput" placeholder="Contraseña" required>
                </div>

                <button type="submit" id="submitBtn" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                    <i class="fas fa-sign-in-alt"></i> Entrar
                </button>
                <button type="button" id="googleBtn" class="btn-google">
                    <i class="fab fa-google"></i> Entrar con Google
                </button>

                <div id="errorMsg" class="error-message" style="display: none;"></div>
            </form>

            <div class="register-link">
                <span id="togglePrefix">¿No tienes cuenta? </span>
                <a id="toggleLink">Regístrate aquí</a>
            </div>
        </div>
    </div>

    <footer>
        <p><i class="fas fa-code"></i> EduLink - Proyecto de Teleprocesos</p>
    </footer>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBZQ8jOu3R_KsB6v_yflpBZnWPWU_ZZjvI",
            authDomain: "edulink-ed7e2.firebaseapp.com",
            projectId: "edulink-ed7e2",
            storageBucket: "edulink-ed7e2.firebasestorage.app",
            messagingSenderId: "284120688026",
            appId: "1:284120688026:web:df3eb785c9c8723e274623"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('emailInput');
        const passwordInput = document.getElementById('passwordInput');
        const nombreInput = document.getElementById('nombreInput');
        const nombreField = document.getElementById('nombreField');
        const submitBtn = document.getElementById('submitBtn');
        const errorMsg = document.getElementById('errorMsg');
        const googleBtn = document.getElementById('googleBtn');

        const formTitle = document.getElementById('formTitle');
        const togglePrefix = document.getElementById('togglePrefix');
        const toggleLink = document.getElementById('toggleLink');

        let isRegisterMode = false;

        // Guardar nombre en Firestore
        async function guardarNombreUsuario(uid, nombre, email) {
            try {
                await setDoc(doc(db, "usuarios", uid), {
                    nombre: nombre,
                    email: email,
                    createdAt: new Date()
                }, { merge: true });
                console.log("✅ Nombre guardado en Firestore");
            } catch (error) {
                console.error("Error guardando nombre:", error);
            }
        }

        // Obtener nombre desde Firestore
        async function obtenerNombreUsuario(uid) {
            try {
                const docRef = doc(db, "usuarios", uid);
                const docSnap = await getDoc(docRef);
                if (docSnap.exists()) {
                    return docSnap.data().nombre;
                }
                return null;
            } catch (error) {
                console.error("Error obteniendo nombre:", error);
                return null;
            }
        }

        // Redirigir después de login exitoso
        async function redirigirConNombre(user) {
            let nombreMostrar = user.displayName || user.email;

            // Intentar obtener nombre de Firestore
            const nombreGuardado = await obtenerNombreUsuario(user.uid);
            if (nombreGuardado) {
                nombreMostrar = nombreGuardado;
            } else if (user.displayName) {
                await guardarNombreUsuario(user.uid, user.displayName, user.email);
                nombreMostrar = user.displayName;
            }

            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', nombreMostrar);
            localStorage.setItem('userEmail', user.email);
            localStorage.setItem('userUid', user.uid);
            window.location.href = 'dashboard.html';
        }

        // Si ya está logueado, redirigir
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                await redirigirConNombre(user);
            }
        });

        // Alternar entre Login y Registro
        toggleLink.addEventListener('click', (e) => {
            e.preventDefault();
            isRegisterMode = !isRegisterMode;
            errorMsg.style.display = 'none';

            if (isRegisterMode) {
                formTitle.innerHTML = '<i class="fas fa-user-plus"></i> Registrarse';
                submitBtn.innerHTML = '<i class="fas fa-user-check"></i> Crear Cuenta';
                togglePrefix.textContent = '¿Ya tienes cuenta? ';
                toggleLink.textContent = 'Inicia sesión aquí';
                nombreField.style.display = 'block';
            } else {
                formTitle.innerHTML = '<i class="fas fa-user-graduate"></i> Iniciar Sesión';
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Entrar';
                togglePrefix.textContent = '¿No tienes cuenta? ';
                toggleLink.textContent = 'Regístrate aquí';
                nombreField.style.display = 'none';
                nombreInput.value = '';
            }
        });

        // Manejar envío de formulario
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = emailInput.value.trim();
            const password = passwordInput.value.trim();
            const nombre = nombreInput.value.trim();

            if (email === '' || password === '') {
                showError('Por favor, introduce todos los campos obligatorios.');
                return;
            }

            if (isRegisterMode && nombre === '') {
                showError('Por favor, introduce tu nombre completo.');
                return;
            }

            errorMsg.style.display = 'none';

            try {
                if (isRegisterMode) {
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    await guardarNombreUsuario(userCredential.user.uid, nombre, email);
                    await redirigirConNombre(userCredential.user);
                } else {
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    await redirigirConNombre(userCredential.user);
                }
            } catch (error) {
                let friendlyMessage = 'Ocurrió un error en la autenticación.';
                switch (error.code) {
                    case 'auth/invalid-email': friendlyMessage = 'El correo electrónico no es válido.'; break;
                    case 'auth/user-disabled': friendlyMessage = 'Este usuario ha sido deshabilitado.'; break;
                    case 'auth/user-not-found': friendlyMessage = 'No existe ningún usuario registrado con este correo.'; break;
                    case 'auth/wrong-password': friendlyMessage = 'Contraseña incorrecta.'; break;
                    case 'auth/email-already-in-use': friendlyMessage = 'Este correo electrónico ya está registrado.'; break;
                    case 'auth/weak-password': friendlyMessage = 'La contraseña debe tener al menos 6 caracteres.'; break;
                    default: friendlyMessage = error.message;
                }
                showError(friendlyMessage);
            }
        });

        // Login con Google
        googleBtn.addEventListener('click', async () => {
            errorMsg.style.display = 'none';
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                if (user.displayName) {
                    await guardarNombreUsuario(user.uid, user.displayName, user.email);
                }
                await redirigirConNombre(user);
            } catch (error) {
                showError('Error al iniciar sesión con Google: ' + error.message);
            }
        });

        function showError(message) {
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
        }
    </script>
</body>

</html>
