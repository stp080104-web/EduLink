<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Cursos - EduLink</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-graduation-cap"></i>
            <span>EduLink</span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fas fa-home"></i> Inicio</a>
            <a href="about.html"><i class="fas fa-info-circle"></i> Acerca de</a>
            <button id="logoutBtn" class="btn-login"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <h1><i class="fas fa-hand-peace"></i> Bienvenido, <span id="userName">Usuario</span></h1>
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="searchInput" placeholder="Buscar curso...">
            </div>
        </div>
        <p><i class="fas fa-book-open"></i> Selecciona un curso para comenzar</p>

        <div id="cursosContainer" class="cursos-grid">
            <div class="loader">
                <div class="loader-spinner"></div>
                <span class="loader-text">Cargando cursos...</span>
            </div>
        </div>
    </div>

    <script type="module">
        const firebaseConfig = {
            apiKey: "AIzaSyBZQ8jOu3R_KsB6v_yflpBZnWPWU_ZZjvI",
            authDomain: "edulink-ed7e2.firebaseapp.com",
            projectId: "edulink-ed7e2",
            storageBucket: "edulink-ed7e2.firebasestorage.app",
            messagingSenderId: "284120688026",
            appId: "1:284120688026:web:df3eb785c9c8723e274623"
        };

        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let allCursos = [];

        // Verificar autenticación
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('userName');
                window.location.href = 'login.html';
            } else {
                const nombreMostrar = localStorage.getItem('userName') || user.email || "Usuario";
                document.getElementById('userName').textContent = nombreMostrar;
                cargarCursos();
            }
        });

        // Cerrar sesión
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('userName');
            localStorage.removeItem('userEmail');
            localStorage.removeItem('userUid');
            window.location.href = 'index.html';
        });

        // Cargar cursos desde Firestore
        async function cargarCursos() {
            const cursosContainer = document.getElementById('cursosContainer');
            cursosContainer.innerHTML = `<div class="loader"><div class="loader-spinner"></div><span class="loader-text">Cargando cursos...</span></div>`;

            try {
                const querySnapshot = await getDocs(collection(db, "cursos"));
                allCursos = [];

                if (querySnapshot.empty) {
                    cursosContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-folder-open"></i>
                            <p>No hay cursos disponibles.</p>
                            <p>Agrega cursos en Firebase Firestore → Colección "cursos"</p>
                        </div>
                    `;
                    return;
                }

                querySnapshot.forEach((doc) => {
                    const curso = doc.data();
                    allCursos.push({ id: doc.id, ...curso });
                });

                renderizarCursos(allCursos);

                // Configurar buscador
                const searchInput = document.getElementById('searchInput');
                searchInput.addEventListener('input', (e) => {
                    const searchTerm = e.target.value.toLowerCase();
                    const filtrados = allCursos.filter(curso =>
                        curso.titulo?.toLowerCase().includes(searchTerm) ||
                        curso.descripcion?.toLowerCase().includes(searchTerm)
                    );
                    renderizarCursos(filtrados);
                });

            } catch (error) {
                console.error("Error cargando cursos:", error);
                cursosContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <p>Error cargando cursos. Verifica la conexión a Firestore.</p>
                    </div>
                `;
            }
        }

        function renderizarCursos(cursos) {
            const cursosContainer = document.getElementById('cursosContainer');

            if (cursos.length === 0) {
                cursosContainer.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-search"></i>
                        <p>No se encontraron cursos con esa búsqueda.</p>
                    </div>
                `;
                return;
            }

            cursosContainer.innerHTML = '';
            cursos.forEach((curso) => {
                const cursoCard = document.createElement('div');
                cursoCard.className = 'curso-card';
                cursoCard.innerHTML = `
                    <img src="${curso.imagen || 'https://via.placeholder.com/300x200?text=EduLink'}" alt="${curso.titulo || 'Curso'}">
                    <h3><i class="fas fa-graduation-cap"></i> ${curso.titulo || 'Sin título'}</h3>
                    <p><i class="fas fa-align-left"></i> ${curso.descripcion || 'Sin descripción'}</p>
                    <button class="btn-primary" onclick="verCurso('${curso.id}')">
                        <i class="fas fa-play-circle"></i> Ver curso
                    </button>
                `;
                cursosContainer.appendChild(cursoCard);
            });
        }

        window.verCurso = (cursoId) => {
            localStorage.setItem('cursoSeleccionado', cursoId);
            window.location.href = 'curso.html';
        };
    </script>
</body>

</html>
